site_name: Symbiotic Programming Index (SPI)
site_description: A practical framework for measuring human–AI coding workflows
site_author: Charles Li
site_url: https://AIPaPaCha.github.io/symbiotic-programming-index
repo_url: https://github.com/AIPaPaCha/symbiotic-programming-index
repo_name: AIPaPaCha/symbiotic-programming-index

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

markdown_extensions:
  - admonition
  - footnotes
  - toc:
      permalink: true
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - Home: index.md
  - Guide:
      - Code Quality (Qc): qc/index.md
      - Human-off Ratio (HoR): hor/index.md
      - AI Explainability (Exp): exp/index.md
      - Stability (Stb): stb/index.md
      - Natural Language Engagement (NLE): nle/index.md
  - Studies:
      - "Qc as Foundational Interface": qc/studies/qc_foundational_interface.md
  - Methodology: methodology.md
  - License: licenses.md
